<!-- public/favicon.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <defs>
        <!-- 배경 그라디언트 (다크 + 보라/블루) -->
        <radialGradient id="bg" cx="30%" cy="0%" r="80%">
            <stop offset="0%"  stop-color="#facc15"/>
            <stop offset="35%" stop-color="#f97316"/>
            <stop offset="80%" stop-color="#4f46e5"/>
            <stop offset="100%" stop-color="#020617"/>
        </radialGradient>

        <!-- 비디오 박스 내부 그라디언트 -->
        <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"  stop-color="#0f172a"/>
            <stop offset="40%" stop-color="#111827"/>
            <stop offset="100%" stop-color="#020617"/>
        </linearGradient>

        <!-- 재생 버튼 그라디언트 -->
        <linearGradient id="play" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"  stop-color="#22d3ee"/>
            <stop offset="50%" stop-color="#6366f1"/>
            <stop offset="100%" stop-color="#a855f7"/>
        </linearGradient>
    </defs>

    <!-- 둥근 전체 배경 -->
    <rect x="4" y="4" width="56" height="56" rx="18" fill="url(#bg)"/>
    <!-- 얇은 테두리 -->
    <rect x="4.5" y="4.5" width="55" height="55" rx="18"
          fill="none" stroke="rgba(148,163,184,0.6)" stroke-width="1.2"/>

    <!-- 비디오 프레임 -->
    <rect x="13" y="17" width="38" height="26" rx="7"
          fill="url(#screen)" stroke="rgba(148,163,184,0.65)" stroke-width="1.4"/>

    <!-- 아래 타임라인 바 -->
    <rect x="18" y="38" width="28" height="3" rx="1.5"
          fill="rgba(15,23,42,0.85)" />
    <rect x="18" y="38" width="18" height="3" rx="1.5"
          fill="url(#play)" />

    <!-- 왼쪽 필름 홀처럼 보이는 점 3개 -->
    <circle cx="18" cy="22" r="1.4" fill="#e5e7eb" fill-opacity="0.7"/>
    <circle cx="18" cy="27" r="1.4" fill="#e5e7eb" fill-opacity="0.55"/>
    <circle cx="18" cy="32" r="1.4" fill="#e5e7eb" fill-opacity="0.4"/>

    <!-- 가운데 재생 버튼 -->
    <path d="M29 23 L29 33 L37 28 Z"
          fill="url(#play)" stroke="rgba(15,23,42,0.8)" stroke-width="0.7"
          stroke-linejoin="round"/>

    <!-- 재생 버튼 살짝 그림자 -->
    <path d="M29 23 L29 33 L33.5 28 Z"
          fill="rgba(15,23,42,0.35)"/>
</svg>
